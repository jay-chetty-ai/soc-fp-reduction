# SOC False Positive Reduction POC - Configuration

# Data paths
data:
  raw_dir: data/raw
  processed_dir: data/processed
  fixtures_dir: data/fixtures
  fixture_size: 10000

# Stage 1: ML Classifier
stage1:
  model_type: lightgbm  # lightgbm or xgboost
  is_unbalance: true
  early_stopping_rounds: 50
  model_artifact_path: models/stage1_model.pkl

# Hyperparameter tuning (Optuna TPE)
tuning:
  n_trials: 50
  cv_folds: 5
  calibration_split: 0.2        # fraction of training data held out for conformal calibration
  # Convergence stopping: halt if best PR-AUC has not improved by convergence_delta
  # in the last convergence_patience consecutive trials
  convergence_patience: 20
  convergence_delta: 0.001
  # Upper ceiling for n_estimators; actual count set per-trial by early stopping
  n_estimators_ceiling: 2000
  optuna_study_name: stage1_lgbm_tuning
  optuna_storage: null           # null = in-memory; set to sqlite:///models/optuna.db to persist

# Conformal Prediction
conformal:
  alpha: 0.05
  auto_fp_threshold: 0.05
  auto_tp_threshold: 0.85
  artifact_path: models/conformal.pkl

# Stage 2: LLM Adjudication
stage2:
  model: claude-sonnet-4-20250514
  max_tokens: 2048
  temperature: 0.1
  timeout_seconds: 10

# RAG
rag:
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384
  top_k: 5
  faiss_index_path: models/faiss_index.bin
  training_df_path: models/training_df.parquet
  device: auto  # auto = CUDA if available, else CPU

# GPU
gpu:
  available: true
  model: NVIDIA RTX 2070 SUPER
  vram_gb: 8
  use_for:
    - embeddings  # 10-20x speedup over CPU for MiniLM-L6-v2
    # LightGBM, SHAP, XGBoost are CPU-only
    # 8GB VRAM insufficient for local LLM inference

# Adversarial Validation
adversarial:
  model: claude-sonnet-4-20250514
  max_tokens: 2048
  temperature: 0.3

# Tripwire
tripwire:
  lookback_days: 7

# LangGraph agent settings
agents:
  max_retries: 3
  retry_base_delay_seconds: 1.0
  retry_max_delay_seconds: 30.0

# A2A agent servers (local HTTP endpoints)
a2a:
  adjudicator:
    host: localhost
    port: 8001
    card_path: /.well-known/agent.json
  adversarial:
    host: localhost
    port: 8002
    card_path: /.well-known/agent.json
  timeout_seconds: 30
  # Set to "inprocess" for testing/single-process mode, "http" for separate server processes
  mode: inprocess

# Evaluation targets
targets:
  pr_auc: 0.85
  auto_fp_fn_rate: 0.01
  tp_recall: 0.95
  volume_reduction: 0.70
  stage2_latency_seconds: 10
  stage1_latency_ms: 500

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
