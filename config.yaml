# SOC False Positive Reduction POC - Configuration

# Data paths and split
data:
  raw_dir: data/raw
  processed_dir: data/processed
  fixtures_dir: data/fixtures
  fixture_size: 10000
  test_day: 5                    # Legacy temporal hold-out day (Friday). Retained for backward compatibility.
                                 # Primary split is now per-label stratified 70/15/15 (see train_stage1.py).

# Stage 1: ML Classifier
stage1:
  model_type: lightgbm  # lightgbm or xgboost
  is_unbalance: true
  early_stopping_rounds: 50
  model_artifact_path: models/stage1_model.pkl
  shap_top_k: 5                  # number of top SHAP features to include in Stage 2 prompts

# Hyperparameter tuning (Optuna TPE)
tuning:
  n_trials: 50
  cv_folds: 5
  calibration_split: 0.2        # Legacy: fraction of training data carved out for calibration.
                                 # Superseded in v1.1 by the per-label stratified val split (15%).
                                 # Retained so split_for_calibration() tests continue to pass.
  # Convergence stopping: halt if best PR-AUC has not improved by convergence_delta
  # in the last convergence_patience consecutive trials
  convergence_patience: 20
  convergence_delta: 0.001
  # Upper ceiling for n_estimators; actual count set per-trial by early stopping
  n_estimators_ceiling: 2000
  optuna_study_name: stage1_lgbm_tuning
  optuna_storage: null           # null = in-memory; set to sqlite:///models/optuna.db to persist

  # Hyperparameter search space bounds.
  # Two presets:
  #
  #   standard  (current): matches original spec; ~1-2 hours on full 2.8M-row dataset.
  #   wide      (Option A): broader bounds for maximum model quality; ~4-8 hours.
  #
  # To switch to the wide preset, change only the three values marked below.
  search_space:
    num_leaves_min: 31
    num_leaves_max: 127           # Option A (wide): 512
    # max_depth_choices: categorical list used by suggest_categorical.
    # Option A (wide): set to null to use suggest_int(3, 12) instead.
    max_depth_choices: [-1, 6, 8, 10]
    learning_rate_min: 0.01
    learning_rate_max: 0.1        # Option A (wide): 0.3
    min_child_samples_min: 10
    min_child_samples_max: 100
    subsample_min: 0.5
    subsample_max: 1.0
    colsample_bytree_min: 0.5
    colsample_bytree_max: 1.0
    reg_alpha_min: 0.0
    reg_alpha_max: 10.0
    reg_lambda_min: 0.0
    reg_lambda_max: 10.0

# Conformal Prediction
conformal:
  alpha: 0.05
  auto_fp_threshold: 0.05
  auto_tp_threshold: 0.85
  artifact_path: models/conformal.pkl

# Stage 2: LLM Adjudication
stage2:
  model: claude-sonnet-4-20250514
  max_tokens: 2048
  temperature: 0.1
  timeout_seconds: 10

# RAG
rag:
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  embedding_dim: 384
  top_k: 5
  faiss_index_path: models/faiss_index.bin
  training_df_path: models/training_df.parquet
  embedding_batch_size: 64       # batch size for SentenceTransformer encode()
  device: auto                   # auto = CUDA if available, else CPU

# GPU
gpu:
  available: true
  model: NVIDIA RTX 2070 SUPER
  vram_gb: 8
  use_for:
    - embeddings  # 10-20x speedup over CPU for MiniLM-L6-v2
    # LightGBM, SHAP, XGBoost are CPU-only
    # 8GB VRAM insufficient for local LLM inference

# Adversarial Validation
adversarial:
  model: claude-sonnet-4-20250514
  max_tokens: 2048
  temperature: 0.3
  confidence_threshold_high: 0.80  # Stage 2 confidence above which Stage 2 wins on disagreement

# Tripwire
tripwire:
  lookback_days: 7

# LangGraph agent settings
agents:
  max_retries: 3
  retry_base_delay_seconds: 1.0
  retry_max_delay_seconds: 30.0

# A2A agent servers (local HTTP endpoints)
a2a:
  adjudicator:
    host: localhost
    port: 8001
    card_path: /.well-known/agent.json
  adversarial:
    host: localhost
    port: 8002
    card_path: /.well-known/agent.json
  timeout_seconds: 30
  # Set to "inprocess" for testing/single-process mode, "http" for separate server processes
  mode: inprocess

# Evaluation targets
targets:
  pr_auc: 0.85
  auto_fp_fn_rate: 0.01
  tp_recall: 0.95
  volume_reduction: 0.70
  stage2_latency_seconds: 10
  stage1_latency_ms: 500

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Dashboard authentication (S8)
# Passwords are bcrypt-hashed (rounds=12). Never store plaintext passwords here.
# Default credentials: analyst / analyst123, viewer / viewer123
# Change these before deploying to any shared environment.
auth:
  credentials:
    usernames:
      analyst:
        name: SOC Analyst
        password: "$2b$12$6A4bqY27U25LxgjW3fIC7.BJGpd8U90Uoms.JHy0XgEweNt2AX.UW"
        role: analyst
      viewer:
        name: SOC Viewer
        password: "$2b$12$t1cjpEWI2RO0vN4G4rGlVeqZHI35RqI96PolU07l8NwGE6kWknP3q"
        role: viewer
  cookie:
    name: soc_dashboard_auth
    key: "soc-fp-reduction-cookie-key-change-in-production"
    expiry_days: 1
  session_timeout_minutes: 60

# Dashboard display settings
dashboard:
  results_dir: results
  metrics_dir: metrics
  feedback_path: data/processed/feedback.jsonl
  audit_log_path: logs/audit.jsonl
